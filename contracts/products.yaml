entity: products
description: Synthetic product dimension.
primary_key: product_id
columns:
  product_id:
    type: string
    nullable: false
    pattern: "^SKU-[0-9]{6}$"
  category:
    type: string
    nullable: false
    accepted_values: [electronics, grocery, apparel, home, sports, beauty]
  base_price:
    type: float
    nullable: false
    min: 0.01
    max: 5000.0
  is_active:
    type: boolean
    nullable: false
quality:
  - rule_id: products_pk_unique
    type: uniqueness
    column: product_id
    severity: error
  - rule_id: products_price_positive
    type: numeric_range
    column: base_price
    min: 0.01
    severity: error
