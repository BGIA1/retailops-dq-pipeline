entity: stores
description: Synthetic store dimension.
primary_key: store_id
columns:
  store_id:
    type: string
    nullable: false
    pattern: "^STORE-[0-9]{3}$"
  region:
    type: string
    nullable: false
    accepted_values: [north, central, south, online]
  store_type:
    type: string
    nullable: false
    accepted_values: [flagship, outlet, fulfillment, online]
quality:
  - rule_id: stores_pk_unique
    type: uniqueness
    column: store_id
    severity: error
  - rule_id: stores_region_catalog
    type: accepted_values
    column: region
    severity: error
