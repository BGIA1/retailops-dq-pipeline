name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy src

      - name: Pytest with coverage
        run: pytest --cov=retaildq --cov-report=term-missing

      - name: RetailDQ deterministic demo
        run: retaildq demo --config configs/ci.yaml

      - name: Docker build validation
        run: docker build -t retaildq-lakehouse:ci .
